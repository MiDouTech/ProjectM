name: CI

# PR 与 main 推送时跑后端测试 + 前端构建，作为合并门禁。
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同分支新推送取消进行中的旧运行，省资源
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: 后端构建与测试 (Maven / Java 17)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Maven test
        run: mvn -B test

  frontend:
    name: 前端构建 (Vite / Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
