server:
  port: 8080

spring:
  application:
    name: mido-pm
  # 数据源：MySQL 8.0 + HikariCP。连接信息支持环境变量覆盖。
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MIDO_DB_URL:jdbc:mysql://localhost:3306/mido_pm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MIDO_DB_USER:root}
    password: ${MIDO_DB_PASSWORD:root}
    hikari:
      # 启动阶段不强制连库，便于无 DB 环境完成上下文装配（骨架阶段）。
      initialization-fail-timeout: -1
      minimum-idle: 0
      maximum-pool-size: 10
      pool-name: MidoHikariPool
  # Redis 7.x
  data:
    redis:
      host: ${MIDO_REDIS_HOST:localhost}
      port: ${MIDO_REDIS_PORT:6379}
  # RabbitMQ 3.x（事件驱动主通道，骨架阶段不声明监听器，不会在启动时连接）
  rabbitmq:
    host: ${MIDO_RABBIT_HOST:localhost}
    port: ${MIDO_RABBIT_PORT:5672}
    username: ${MIDO_RABBIT_USER:mido}
    password: ${MIDO_RABBIT_PASSWORD:mido}
  # Flyway 数据库迁移：启动时自动执行 db/migration 下脚本
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  # 文件上传：附件后端代理上传的体积上限
  servlet:
    multipart:
      max-file-size: ${MIDO_UPLOAD_MAX:50MB}
      max-request-size: ${MIDO_UPLOAD_MAX:50MB}

# MyBatis-Plus：下划线转驼峰 + 逻辑删除 + 雪花主键
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: assign_id
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 业务自定义配置
mido:
  # JWT（租户侧本地 SSO 使用），生产请覆盖 secret
  jwt:
    secret: ${MIDO_JWT_SECRET:mido-pm-default-secret-key-please-change-in-prod}
    ttl-millis: 86400000
    # 模拟登录令牌有效期（默认 30 分钟），平台运营进租户排障用
    impersonation-ttl-millis: ${MIDO_IMPERSONATION_TTL:1800000}
  # 平台运营后台 JWT（独立密钥，与租户 SSO 物理隔离），生产必须覆盖；默认有效期 12h
  platform:
    jwt:
      secret: ${MIDO_PLATFORM_JWT_SECRET:mido-platform-console-secret-key-change-me}
      ttl-millis: 43200000
  # MinIO / S3 兼容对象存储连接（客户端 Bean 随存储模块接入）
  minio:
    endpoint: ${MIDO_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MIDO_MINIO_ACCESS_KEY:mido}
    secret-key: ${MIDO_MINIO_SECRET_KEY:mido12345}
    bucket: ${MIDO_MINIO_BUCKET:mido-pm}
  # 企微（凭证一律走环境变量注入，禁硬编码；仓库内不放真实值）
  wecom:
    corp-id: ${MIDO_WECOM_CORP_ID:}
    message:
      # 是否真发企微应用消息；默认关，关闭时走 Mock（仅日志，不外呼）便于预演
      enabled: ${MIDO_WECOM_MSG_ENABLED:false}
      secret: ${MIDO_WECOM_MSG_SECRET:}
      agent-id: ${MIDO_WECOM_MSG_AGENT_ID:}
    sso:
      # 是否启用企微 SSO（OAuth2 网页授权登录）；默认关。凭证走环境变量、不入库
      enabled: ${MIDO_WECOM_SSO_ENABLED:false}
      secret: ${MIDO_WECOM_SSO_SECRET:}
      agent-id: ${MIDO_WECOM_SSO_AGENT_ID:}
    contacts:
      # 是否启用企微通讯录同步（拉部门/成员 upsert + 写 sys_identity_map）；默认关。通讯录 secret 走环境变量
      enabled: ${MIDO_WECOM_CONTACTS_ENABLED:false}
      secret: ${MIDO_WECOM_CONTACTS_SECRET:}

# Swagger / OpenAPI 3.0
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.mido.pm: info
